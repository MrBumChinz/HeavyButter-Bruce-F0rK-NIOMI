services:
  appstore:
    image: caddy:2-alpine
    container_name: heavybutter-appstore
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
      - "${PORT_SSL:-443}:443"
    environment:
      - DOMAIN=${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./www:/www:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
